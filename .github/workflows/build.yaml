name: Direct Android Build

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Metro dependencies
        run: |
          npm install --save-dev @react-native/metro-config
          npm install @expo/metro-config
      
      - name: Generate native Android files
        run: npx expo prebuild --clean
      
      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets
      
      - name: Bundle JavaScript with Expo
        run: |
          npx expo export --platform android --dev=false --output-dir dist
          # Copy the bundle to the correct location
          if [ -f "dist/index.android.bundle" ]; then
            cp dist/index.android.bundle android/app/src/main/assets/index.android.bundle
          elif [ -f "dist/index.js" ]; then
            cp dist/index.js android/app/src/main/assets/index.android.bundle
          else
            echo "Error: Bundle file not found in dist/"
            ls -la dist/
            exit 1
          fi
      
      - name: Verify bundle
        run: |
          if [ -f "android/app/src/main/assets/index.android.bundle" ]; then
            echo "✅ Bundle size: $(ls -lh android/app/src/main/assets/index.android.bundle | awk '{print $5}')"
          else
            echo "❌ Bundle not created"
            exit 1
          fi
      
      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      
      - name: Verify APK
        run: |
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ APK size: $(ls -lh android/app/build/outputs/apk/debug/app-debug.apk | awk '{print $5}')"
          else
            echo "❌ APK not created"
            exit 1
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7