name: Direct Android Build

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20          # ← Changed from 18 to 20 (required for Expo SDK 54/55)
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: npm ci
      
      # Removed the manual Metro config installs — they often cause conflicts
      # Let Expo handle its own @expo/metro-config
      
      - name: Generate native Android files
        run: npx expo prebuild --clean
      
      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets
      
      - name: Bundle JavaScript with Expo
        run: |
          npx expo export --platform android --dev=false --output-dir dist
          
          # Improved bundle copy logic (Expo export structure can vary)
          mkdir -p android/app/src/main/assets
          
          if ls dist/bundles/android-*.js 1> /dev/null 2>&1; then
            cp dist/bundles/android-*.js android/app/src/main/assets/index.android.bundle
            echo "✅ Copied bundle from dist/bundles/"
          elif [ -f "dist/index.android.bundle" ]; then
            cp dist/index.android.bundle android/app/src/main/assets/index.android.bundle
            echo "✅ Copied dist/index.android.bundle"
          elif [ -f "dist/index.js" ]; then
            cp dist/index.js android/app/src/main/assets/index.android.bundle
            echo "✅ Copied dist/index.js"
          else
            echo "❌ Error: Bundle file not found in dist/"
            echo "Contents of dist/:"
            ls -la dist/ || true
            echo "Contents of dist/bundles/ (if exists):"
            ls -la dist/bundles/ 2>/dev/null || true
            exit 1
          fi
      
      - name: Verify bundle
        run: |
          if [ -f "android/app/src/main/assets/index.android.bundle" ]; then
            echo "✅ Bundle created successfully"
            echo "Bundle size: $(ls -lh android/app/src/main/assets/index.android.bundle | awk '{print $5}')"
          else
            echo "❌ Bundle not found after copy step"
            exit 1
          fi
      
      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      
      - name: Verify APK
        run: |
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ APK built successfully"
            echo "APK size: $(ls -lh android/app/build/outputs/apk/debug/app-debug.apk | awk '{print $5}')"
          else
            echo "❌ APK not created"
            ls -la android/app/build/outputs/apk/debug/ || true
            exit 1
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7