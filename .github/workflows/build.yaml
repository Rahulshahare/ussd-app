name: Direct Android Build

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Metro dependencies (fix)
        run: |
          npm install --save-dev @react-native/metro-config
          npm install @expo/metro-config
      
      - name: Generate native Android files
        run: npx expo prebuild --clean
      
      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets
      
      - name: Bundle JavaScript with Expo
        run: |
          npx expo export --platform android --dev false --output-dir dist
          # Copy the bundled file to the correct location
          cp dist/index.android.bundle android/app/src/main/assets/index.android.bundle 2>/dev/null || \
          cp dist/index.js android/app/src/main/assets/index.android.bundle 2>/dev/null || \
          echo "Bundle file not found, checking dist contents..." && ls -la dist/
      
      - name: Verify bundle was created
        run: |
          if [ -f "android/app/src/main/assets/index.android.bundle" ]; then
            echo "✅ Bundle created: $(ls -lh android/app/src/main/assets/index.android.bundle)"
          else
            echo "❌ Bundle missing!"
            exit 1
          fi
      
      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7